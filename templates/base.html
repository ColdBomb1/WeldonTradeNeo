<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}WeldonTrader{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css" />
    {% block head %}{% endblock %}
  </head>
  <body>
    <aside class="sidebar">
      <h1>WeldonTrader</h1>
      <nav>
        <div class="section-label">Overview</div>
        <a href="/dashboard" {% if active_page == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
        <a href="/analytics" {% if active_page == 'analytics' %}class="active"{% endif %}>Performance</a>
        <div class="section-label">Research</div>
        <a href="/research" {% if active_page == 'research' %}class="active"{% endif %}>Research Runs</a>
        <a href="/rulesets" {% if active_page == 'rulesets' %}class="active"{% endif %}>Strategy Portfolio</a>
        <a href="/portfolio-backtest" {% if active_page == 'portfolio_backtest' %}class="active"{% endif %}>Portfolio Backtest</a>
        <div class="section-label">Trading</div>
        <a href="/operations" {% if active_page == 'operations' %}class="active"{% endif %}>Trade Operations</a>
        <a href="/accounts" {% if active_page == 'accounts' %}class="active"{% endif %}>Accounts</a>
        <div class="section-label">Data</div>
        <a href="/market-context" {% if active_page == 'market_context' %}class="active"{% endif %}>Market Context</a>
        <div class="section-label">System</div>
        <a href="/settings" {% if active_page == 'settings' %}class="active"{% endif %}>Settings</a>
      </nav>
    </aside>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
    <script>
      if (window.Chart) {
        Chart.defaults.color = '#8da1b3';
        Chart.defaults.borderColor = '#22313d';
        Chart.defaults.font.family = '"IBM Plex Sans", "Segoe UI", sans-serif';
      }
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
